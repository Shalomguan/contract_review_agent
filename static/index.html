<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Review Risk Agent</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #1f2937;
        }
        .page {
            max-width: 1080px;
            margin: 0 auto;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }
        h1, h2 {
            margin-top: 0;
        }
        textarea, input[type="file"] {
            width: 100%;
            margin-top: 12px;
        }
        textarea {
            min-height: 220px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            resize: vertical;
        }
        button {
            margin-top: 12px;
            margin-right: 12px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #0f172a;
            color: #fff;
            cursor: pointer;
        }
        button.secondary {
            background: #475569;
        }
        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 10px;
            overflow-x: auto;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 10px;
        }
        .muted {
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>合同审查风险 Agent MVP</h1>
            <div class="muted">后端接口：/api/review/upload /api/review/analyze /api/review/{review_id} /api/reviews</div>
        </div>

        <div class="card">
            <h2>文本分析</h2>
            <textarea id="contractText" placeholder="粘贴合同文本"></textarea>
            <div>
                <button onclick="analyzeText()">提交分析</button>
                <button class="secondary" onclick="loadSample()">加载样例文本</button>
            </div>
        </div>

        <div class="card">
            <h2>文件上传分析</h2>
            <input id="fileInput" type="file" />
            <div>
                <button onclick="uploadFile()">上传并分析</button>
            </div>
        </div>

        <div class="card">
            <h2>历史记录</h2>
            <button class="secondary" onclick="loadReviews()">刷新历史</button>
            <ul id="reviewList"></ul>
        </div>

        <div class="card">
            <h2>结果</h2>
            <pre id="result">等待分析结果...</pre>
        </div>
    </div>

    <script>
        const sampleText = `软件开发服务合同

第一条 服务内容
乙方负责为甲方开发内部管理系统，并根据甲方要求完成部署与培训。

第二条 付款安排
甲方应在合同签订后三个工作日内支付全部预付款。如甲方逾期付款，每逾期一日，按合同总金额的 5% 向乙方支付滞纳金。

第三条 免责条款
如甲方认为项目延期或交付结果不符合预期，乙方无需承担任何责任。

第四条 单方解除
甲方有权在任何时候单方解除本合同，且无需说明理由，乙方应无条件配合。

第五条 知识产权
乙方在履行本合同过程中形成的全部软件代码、文档、模型、接口及相关知识产权永久归甲方所有。

第六条 争议解决
因本合同引起的任何争议，仅可向甲方所在地人民法院提起诉讼。`;

        function setResult(data) {
            document.getElementById("result").textContent = JSON.stringify(data, null, 2);
        }

        function loadSample() {
            document.getElementById("contractText").value = sampleText;
        }

        async function analyzeText() {
            const text = document.getElementById("contractText").value.trim();
            if (!text) {
                alert("请输入合同文本");
                return;
            }

            const response = await fetch("/api/review/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    document_name: "sample_contract.txt",
                    text: text
                })
            });
            const data = await response.json();
            setResult(data);
            loadReviews();
        }

        async function uploadFile() {
            const input = document.getElementById("fileInput");
            if (!input.files.length) {
                alert("请选择文件");
                return;
            }

            const form = new FormData();
            form.append("file", input.files[0]);

            const response = await fetch("/api/review/upload", {
                method: "POST",
                body: form
            });
            const data = await response.json();
            setResult(data);
            loadReviews();
        }

        async function loadReviews() {
            const response = await fetch("/api/reviews");
            const data = await response.json();
            const list = document.getElementById("reviewList");
            list.innerHTML = "";

            for (const item of data.items || []) {
                const entry = document.createElement("li");
                entry.innerHTML = `
                    <strong>${item.document_name}</strong>
                    <span class="muted"> (${item.created_at}) </span>
                    <button class="secondary" data-id="${item.review_id}">查看详情</button>
                `;
                entry.querySelector("button").addEventListener("click", async () => {
                    const detailResponse = await fetch("/api/review/" + item.review_id);
                    const detail = await detailResponse.json();
                    setResult(detail);
                });
                list.appendChild(entry);
            }
        }

        loadReviews();
    </script>
</body>
</html>
